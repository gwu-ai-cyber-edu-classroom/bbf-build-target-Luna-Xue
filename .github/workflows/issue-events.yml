name: issue-events

# Slash-command lifecycle for Break Report issues:
#   /repro-confirmed  (target)      -> valid      (the break scores)
#   /repro-failed     (target)      -> invalid
#   /out-of-scope     (facilitator) -> invalid
#   /fix-confirmed    (breaker)     -> fixed       (fix verified by the team that filed it)
#   /fix-failed       (breaker)     -> fix-rejected + reopen (the fix didn't hold)
# Plus: when a merged PR closes a valid issue, it becomes `fix-claimed`
# (awaiting the breaker's confirmation) — not `fixed` until the breaker confirms.
#
# Labels are auto-created so a missing label can't silently swallow a command.

on:
  issue_comment:
    types: [created]
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  slash:
    if: github.event_name == 'issue_comment' && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
      BODY: ${{ github.event.comment.body }}
      ASSOC: ${{ github.event.comment.author_association }}
      COMMENTER: ${{ github.event.comment.user.login }}
      AUTHOR: ${{ github.event.issue.user.login }}
    steps:
      - name: Handle slash command
        run: |
          set -uo pipefail
          CMD=$(printf '%s' "$BODY" | head -c 200 | head -n1 | tr -d '\r' | xargs)
          ensure() { gh label create "$1" -R "$REPO" -c "$2" -d "$3" --force >/dev/null 2>&1 || true; }
          addl()   { gh issue edit "$ISSUE" -R "$REPO" --add-label "$1" || true; }
          reml()   { gh issue edit "$ISSUE" -R "$REPO" --remove-label "$1" || true; }
          is_facilitator() { [[ "$ASSOC" == "MEMBER" || "$ASSOC" == "OWNER" || "$ASSOC" == "COLLABORATOR" ]]; }
          is_breaker()     { [[ "$COMMENTER" == "$AUTHOR" ]] || is_facilitator; }

          case "$CMD" in
            /repro-confirmed*)
              ensure valid 0E8A16 "Break confirmed reproducible"; addl valid; reml invalid ;;
            /repro-failed*)
              ensure invalid B60205 "Break failed repro or ruled out"; addl invalid; reml valid ;;
            /out-of-scope*)
              if is_facilitator; then
                ensure invalid B60205 "Ruled out by a facilitator"; addl invalid; reml valid
              else echo "::notice::/out-of-scope ignored: commenter is not an org member"; fi ;;
            /fix-confirmed*)
              # The team that FILED the break (the issue author) verifies the fix.
              if is_breaker; then
                ensure fixed 1D76DB "Fix confirmed by the breaker"
                addl fixed; reml fix-claimed; reml fix-rejected
              else echo "::notice::/fix-confirmed ignored: only the breaker who filed this issue (or a facilitator) can confirm the fix"; fi ;;
            /fix-failed*)
              if is_breaker; then
                ensure fix-rejected D29922 "Fix did not hold — breaker re-broke it"
                addl fix-rejected; reml fixed; reml fix-claimed
                gh issue reopen "$ISSUE" -R "$REPO" || true
              else echo "::notice::/fix-failed ignored: only the breaker who filed this issue (or a facilitator) can reject the fix"; fi ;;
            *) : ;;
          esac

  fix-claim-on-close:
    if: github.event_name == 'issues' && github.event.action == 'closed' && contains(github.event.issue.labels.*.name, 'valid')
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      ISSUE: ${{ github.event.issue.number }}
      REPO: ${{ github.repository }}
    steps:
      - name: Mark fix claimed (awaiting breaker confirmation)
        run: |
          set -uo pipefail
          # If the breaker already confirmed it (label `fixed`), leave it.
          if gh issue view "$ISSUE" -R "$REPO" --json labels --jq '.labels[].name' | grep -qx fixed; then
            echo "Already breaker-confirmed (fixed); nothing to do."
            exit 0
          fi
          gh label create fix-claimed E3B341 "Fix merged; awaiting breaker confirmation" -R "$REPO" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE" -R "$REPO" --add-label fix-claimed || true
